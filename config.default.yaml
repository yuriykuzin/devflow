# Devflow default configuration
# Copy to ~/.devflow/config.yaml and customize as needed.
# Per-project overrides: place .devflow.yaml in project root.

# ──────────────────────────────────────────────────────────────
# BACKEND SELECTOR — change this one line to switch everything
# ──────────────────────────────────────────────────────────────
backend: claude              # codex | claude

# ──────────────────────────────────────────────────────────────
# Backend: claude (Claude Code CLI)
# ──────────────────────────────────────────────────────────────
claude:
  reviewer:
    command: "claude"
    flags: "-p --output-format json --permission-mode plan"
    model: "opus"                    # alias: opus → claude-opus-4-6
    effort: "max"                    # --effort max (thorough reviews)
  implementer:
    command: "claude"
    flags: "-p --output-format json --permission-mode default"
    model: "sonnet"                  # alias: sonnet → claude-sonnet-4-6
    effort: "high"                   # --effort high (fast implementation)
  session_reuse: true
  # Protocol notes:
  #   Headless mode:    -p (print mode, non-interactive)
  #   Model:            --model <alias|full-name>
  #   Effort:           --effort <low|medium|high|max>
  #   JSON output:      --output-format json
  #   Session capture:  jq -r '.session_id' from JSON output
  #   Session resume:   claude -p --resume <session_id>
  #   Read-only review: --permission-mode plan (no file writes)
  #   Full access:      --permission-mode default
  #   Tool restrict:    --allowedTools "Read Grep Glob"

# ──────────────────────────────────────────────────────────────
# Backend: codex (Codex CLI)
# ──────────────────────────────────────────────────────────────
codex:
  reviewer:
    command: "codex exec"
    flags: "--full-auto"
    model: "gpt-5.4"
    effort: "xhigh"                  # via -c 'model_reasoning_effort="..."'
  implementer:
    command: "codex exec"
    flags: "--full-auto"
    model: "gpt-5.4"
    effort: "high"                   # via -c 'model_reasoning_effort="..."'
  session_reuse: true
  # Rate-limit fallback: when codex hits "limit reached", retry with this
  # command instead. Typically codex-local-proxy (same CLI interface, routes
  # through a local proxy with its own API key / rate limit pool).
  # Comment out or set to "" to disable fallback (fail immediately).
  fallback_command: "codex-local-proxy"
  # Protocol notes:
  #   Headless mode:    --full-auto
  #   Model:            -m <model>
  #   Effort:           -c 'model_reasoning_effort="<effort>"' (NOT --effort)
  #   JSON output:      --json (JSONL events on stdout)
  #   Session capture:  head -1 events.jsonl | jq -r '.thread_id'
  #   Session resume:   codex exec resume <session_id>
  #   Output file:      -o <path>

# ──────────────────────────────────────────────────────────────
# Shared settings (apply regardless of backend)
# ──────────────────────────────────────────────────────────────

# Default autonomy mode
# attended    — ask user on ambiguity (default)
# unattended  — never ask, make best-effort decisions
autonomy: attended

# Where to save reports and artifacts
output_dir: "docs/devflow/reports"

# Maximum review iterations before escalating to user
max_review_iterations: 7

# ──────────────────────────────────────────────────────────────
# Multi-persona review — external reviewer spawns sub-agents
# with different review perspectives for deeper coverage.
# See skills/devflow-review/references/review-personas.md
# ──────────────────────────────────────────────────────────────
review_personas:
  enabled: true                       # false → single-reviewer fallback prompt
  personas:
    - architect                       # Martin Fowler — design, patterns, SOLID
    - security                        # Ethical Hacker — OWASP, injection, auth
    - readability                     # Junior Dev — clarity, confusion points, "why?"
    - performance                     # Performance Hawk — N+1, allocations, complexity
    - qa                              # Devil's Advocate — edge cases, error paths, races
    - conservator                     # Codebase Conservator — naming, imports, style consistency

# Tool integrations — comment out to skip during install/uninstall.
# If this section is absent, all detected tools are installed.
integrations:
  codex: true
  claude-code: true
  windsurf: true
  # cursor: true       # auto-detected from repo — no install step needed
  # gemini: true       # auto-detected from repo — no install step needed
